<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Complete</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #f5f5f7; color: #1d1d1f;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 56px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    text-align: center;
    max-width: 460px;
  }
  .icon { font-size: 56px; margin-bottom: 16px; }
  h1 { font-size: 26px; margin-bottom: 8px; }
  p  { color: #6e6e73; margin-bottom: 24px; line-height: 1.5; }
  .stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 32px; }
  .stat { text-align: center; }
  .stat .num { font-size: 28px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: #6e6e73; text-transform: uppercase; }
  .green { color: #34c759; }
  .red   { color: #ff3b30; }
  .gray  { color: #8e8e93; }
  code {
    display: inline-block;
    background: #f5f5f7;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: "SF Mono", monospace;
    font-size: 14px;
    color: #1d1d1f;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Review complete</h1>
  <p>Your decisions have been saved. Run the command below to write approved changes to Apple Contacts.</p>

  <div class="stats">
    <div class="stat">
      <div class="num green">{{ approved }}</div>
      <div class="lbl">Approved</div>
    </div>
    <div class="stat">
      <div class="num red">{{ rejected }}</div>
      <div class="lbl">Rejected</div>
    </div>
    <div class="stat">
      <div class="num gray">{{ skipped }}</div>
      <div class="lbl">Skipped</div>
    </div>
  </div>

  <code>linkedin-enricher apply</code>
  <br>
  <small style="color:#6e6e73">Add <code>--dry-run</code> to preview changes first.</small>
</div>
</body>
</html>
